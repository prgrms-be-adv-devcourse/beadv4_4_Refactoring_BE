name: CD

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          TOSS_PAYMENTS_SECRET_KEY=${{ secrets.TOSS_PAYMENTS_SECRET_KEY }}
          EOF

      - name: Copy .env to EC2
        run: |
          scp .env ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/deploy/.env
          rm .env

      - name: Deploy member-service
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd ~/deploy
            chmod 600 .env
            docker compose pull member-service
            docker compose up -d member-service
          EOF
