server:
  port: 8083

spring:
  application:
    name: market-service

  jackson:
    time-zone: Asia/Seoul

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# 상품 정산 비율 (공통)
custom:
  market:
    product:
      payoutRate: 80

# JWT 설정
jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-exp-seconds: 1800
  refresh-token-exp-seconds: 1209600
  issuer: "thock"

# Actuator & Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# SpringDoc
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: false

outbox:
  enabled: true
  poller:
    enabled: true
    interval-ms: 5000
    batch-size: 100
    max-retry: 5
  cleanup:
    cron: "0 0 3 * * *"

feign:
  circuitbreaker:
    enabled: true                   # Feign 호출에 Resilience4j 서킷브레이커 연동 활성화
  client:
    config:
      default:
        connectTimeout: 5000        # 모든 FeignClient에 적용되는 기본 값
        readTimeout: 5000           # TCP 연결 맺는 데 최대 5초
        loggerLevel: basic          # 요청/응답 URL, 상태코드만 로그 출력

resilience4j:
  circuitbreaker:
    instances:
      product-client:
        sliding-window-size: 10                 # 최근 10번의 호출을 기준으로 판단
        failure-rate-threshold: 50              # 10번 중 5번 (50%) 실패 시 서킷 OPEN
        wait-duration-in-open-state: 10s        # OPEN 후 10초 동안 호출 차단 / 이후 HALF_OPEN(일부 호출 허용, 테스트)
      payment-wallet-client:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s